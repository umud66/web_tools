<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具合集</title>
  <link rel="stylesheet" href="./common.css" />
  <style>
    :root {
      --bg1: #f7f1e7;
      --bg2: #ead8bc;
      --panel: rgba(255, 251, 244, 0.88);
      --text: #2e2418;
      --muted: #6e614f;
      --line: rgba(189, 163, 129, 0.42);
      --accent: #b85c38;
      --accent-dark: #944828;
      --shadow: 0 20px 50px rgba(89, 63, 37, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(184, 92, 56, 0.15), transparent 28%),
        radial-gradient(circle at right bottom, rgba(84, 119, 99, 0.16), transparent 25%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 22px 16px;
    }

    .page {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero {
      padding: 22px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 34px);
      line-height: 1.12;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 660px;
      font-size: 14px;
    }

    .section {
      padding: 20px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(89, 63, 37, 0.1);
      backdrop-filter: blur(8px);
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 18px;
      border-radius: 20px;
      background: rgba(255, 249, 241, 0.78);
      border: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(89, 63, 37, 0.08);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(184, 92, 56, 0.45);
      background: rgba(255, 249, 241, 0.96);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent-dark);
      background: rgba(184, 92, 56, 0.1);
      margin-bottom: 10px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .card p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .link {
      font-weight: 700;
      color: var(--accent);
      font-size: 14px;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="site-nav" data-site-nav></div>

    <section class="hero">
      <h1>工具合集</h1>
      <p>这里集中放一些浏览器里直接可用的小工具。工具分类、标题和链接都来自本地配置文件，后续新增工具时只需要改 `tools.json`。</p>
    </section>

    <section class="section">
      <h2>全部工具</h2>
      <div class="grid" id="toolGrid">
        <div class="empty">正在加载工具列表...</div>
      </div>
    </section>
  </main>

  <script src="./common-ui.js"></script>
  <script>
    async function initHomePage() {
      const config = await window.ToolSite.initSiteNav();
      const toolGrid = document.getElementById("toolGrid");
      if (!config) {
        toolGrid.innerHTML = '<div class="empty">工具配置加载失败。</div>';
        return;
      }

      const tools = window.ToolSite.flattenTools(config);
      toolGrid.innerHTML = tools.map((tool) => `
        <a class="card" href="${tool.href}">
          <span class="tag">${tool.tag || tool.categoryTitle}</span>
          <h3>${tool.title}</h3>
          <p>${tool.description}</p>
          <div class="link">进入工具</div>
        </a>
      `).join("");
    }

    initHomePage();
  </script>
</body>
</html>
